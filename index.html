// <PURE-LOGIC>
const Logic = (function(){
  const MONTHS=["januar","februar","marec","april","maj","junij","julij","avgust","september","oktober","november","december"];
  const DOW_SHORT=["pon","tor","sre","čet","pet","sob","ned"];
  const DOW_LONG=["ponedeljek","torek","sreda","četrtek","petek","sobota","nedelja"];
  function pad2(n){ return (n<10?"0":"")+n; }
  function ymd(d){ return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate()); }
  function parseYMD(s){ const p=s.split("-"); return new Date(+p[0],+p[1]-1,+p[2]); }
  function weekdayMon0(d){ return (d.getDay()+6)%7; }
  function freeCountForDay(members, busySet, ds){ let n=0; for(const m of members){ if(!busySet.has(m.id+"|"+ds)) n++; } return n; }
  function isGreen(free, thr){ return thr>0 && free>=thr; }
  function whoFree(members, busySet, ds){ return members.filter(m=>!busySet.has(m.id+"|"+ds)); }
  function whoBusy(members, busySet, ds){ return members.filter(m=> busySet.has(m.id+"|"+ds)); }
  function monthMatrix(y,mi){ const f=new Date(y,mi,1); const s=new Date(y,mi,1-weekdayMon0(f)); const o=[]; for(let i=0;i<42;i++) o.push(new Date(s.getFullYear(),s.getMonth(),s.getDate()+i)); return o; }
  function monthDays(y,mi){ const n=new Date(y,mi+1,0).getDate(); const o=[]; for(let d=1;d<=n;d++) o.push(ymd(new Date(y,mi,d))); return o; }
  function bestDates(members, busySet, dayStrs, thr, limit){
    const a=dayStrs.map(ds=>{ const free=freeCountForDay(members,busySet,ds); return {day:ds,free,green:isGreen(free,thr)}; });
    a.sort((x,y)=> y.free-x.free || (x.day<y.day?-1:1)); return a.slice(0,limit||5);
  }
  function bestWeekday(members, busySet, dayStrs, thr){
    const b=Array.from({length:7},(_,i)=>({weekday:i,sum:0,n:0,meet:0}));
    for(const ds of dayStrs){ const wd=weekdayMon0(parseYMD(ds)); const free=freeCountForDay(members,busySet,ds); b[wd].sum+=free; b[wd].n+=1; if(isGreen(free,thr)) b[wd].meet+=1; }
    return b.map(x=>({weekday:x.weekday,avg:x.n?x.sum/x.n:0,n:x.n,meet:x.meet})).sort((a,c)=>c.avg-a.avg||c.meet-a.meet);
  }
  function genCode(rand){ const w=["klapa","ekipa","druzba","banda","krog","zmaji","sokoli","medo","kompot","raja"]; return w[Math.floor(rand()*w.length)]+"-"+Math.floor(rand()*900+100); }
  const API={MONTHS,DOW_SHORT,DOW_LONG,pad2,ymd,parseYMD,weekdayMon0,freeCountForDay,isGreen,whoFree,whoBusy,monthMatrix,monthDays,bestDates,bestWeekday,genCode};
  if(typeof module!=="undefined"&&module.exports) module.exports=API;
  return API;
})();

function uuid(){ return (crypto.randomUUID?crypto.randomUUID():"id-"+Math.random().toString(36).slice(2)+Date.now().toString(36)); }

/* ===== SHRAMBA: lokalno ===== */
class LocalStore{
  constructor(code){ this.code=code; this.key="ksd:"+code; }
  _r(){ try{const r=localStorage.getItem(this.key); if(r){const d=JSON.parse(r); d.votes=d.votes||[]; d.group.phase=d.group.phase||"availability"; d.group.final_days=d.group.final_days||[]; return d;}}catch(e){} return {group:{id:this.code,name:"",threshold:6,phase:"availability",final_days:[]},members:[],busy:[],votes:[]}; }
  _w(db){ localStorage.setItem(this.key,JSON.stringify(db)); }
  async loadAll(){ return this._r(); }
  async ensureGroup(name){ const db=this._r(); if(name&&!db.group.name){db.group.name=name; this._w(db);} }
  async setThreshold(n){ const db=this._r(); db.group.threshold=n; this._w(db); }
  async addMember(name){ const db=this._r(); const m={id:uuid(),name}; db.members.push(m); this._w(db); return m; }
  async renameMember(id,name){ const db=this._r(); const m=db.members.find(x=>x.id===id); if(m){m.name=name; this._w(db);} }
  async deleteMember(mid){ const db=this._r(); db.members=db.members.filter(m=>m.id!==mid); db.busy=db.busy.filter(b=>b.member_id!==mid); db.votes=db.votes.filter(v=>v.member_id!==mid); this._w(db); }
  async toggleBusy(mid,day){ const db=this._r(); const i=db.busy.findIndex(b=>b.member_id===mid&&b.day===day); if(i>=0) db.busy.splice(i,1); else db.busy.push({member_id:mid,day}); this._w(db); }
  async startFinalVote(days){ const db=this._r(); db.group.phase="finalvote"; db.group.final_days=days; db.votes=[]; this._w(db); }
  async cancelFinalVote(){ const db=this._r(); db.group.phase="availability"; db.group.final_days=[]; db.votes=[]; this._w(db); }
  async toggleVote(mid,day){ const db=this._r(); const i=db.votes.findIndex(v=>v.member_id===mid&&v.day===day); if(i>=0) db.votes.splice(i,1); else db.votes.push({member_id:mid,day}); this._w(db); }
  subscribe(cb){ const h=e=>{ if(e.key===this.key) cb(); }; window.addEventListener("storage",h); return ()=>window.removeEventListener("storage",h); }
}
/* ===== SHRAMBA: Supabase ===== */
class CloudStore{
  constructor(code){ this.code=code; this.sb=window.__sb; }
  async loadAll(){
    const code=this.code, sb=this.sb;
    const [g,m,b]=await Promise.all([
      sb.from("groups").select("*").eq("id",code).maybeSingle(),
      sb.from("members").select("*").eq("group_id",code).order("created_at"),
      sb.from("busy_days").select("member_id,day").eq("group_id",code)
    ]);
    for(const r of [g,m,b]) if(r.error) throw r.error;
    let votes = [];
    try { const v = await sb.from("votes").select("member_id,day").eq("group_id",code); if(!v.error) votes = v.data||[]; } catch(e){}
    const grp = g.data||{id:code,name:"",threshold:6};
    grp.phase = grp.phase || "availability";
    grp.final_days = grp.final_days || [];
    return { group:grp, members:m.data||[], busy:b.data||[], votes };
  }
  async ensureGroup(name){ const {error}=await this.sb.from("groups").upsert({id:this.code,name:name||null},{onConflict:"id",ignoreDuplicates:true}); if(error&&error.code!=="23505") throw error; }
  async setThreshold(n){ const {error}=await this.sb.from("groups").update({threshold:n}).eq("id",this.code); if(error) throw error; }
  async addMember(name){ const {data,error}=await this.sb.from("members").insert({group_id:this.code,name}).select().single(); if(error) throw error; return data; }
  async renameMember(id,name){ const {error}=await this.sb.from("members").update({name}).eq("id",id); if(error) throw error; }
  async deleteMember(mid){ await this.sb.from("busy_days").delete().eq("member_id",mid); try{await this.sb.from("votes").delete().eq("member_id",mid);}catch(e){} const {error}=await this.sb.from("members").delete().eq("id",mid); if(error) throw error; }
  async toggleBusy(mid,day){
    const r1 = await this.sb.from("busy_days").select("id").eq("member_id",mid).eq("day",day).maybeSingle();
    if(r1.error) throw r1.error;
    if(r1.data) { const r2 = await this.sb.from("busy_days").delete().eq("id",r1.data.id); if(r2.error) throw r2.error; }
    else { const r3 = await this.sb.from("busy_days").insert({group_id:this.code,member_id:mid,day}); if(r3.error) throw r3.error; }
  }
  async startFinalVote(days){
    try{await this.sb.from("votes").delete().eq("group_id",this.code);}catch(e){}
    const {error}=await this.sb.from("groups").update({phase:"finalvote",final_days:days}).eq("id",this.code);
    if(error) throw error;
  }
  async cancelFinalVote(){
    try{await this.sb.from("votes").delete().eq("group_id",this.code);}catch(e){}
    const {error}=await this.sb.from("groups").update({phase:"availability",final_days:[]}).eq("id",this.code);
    if(error) throw error;
  }
  async toggleVote(mid,day){
    const r1 = await this.sb.from("votes").select("id").eq("member_id",mid).eq("day",day).maybeSingle();
    if(r1.error) throw r1.error;
    if(r1.data) { const r2 = await this.sb.from("votes").delete().eq("id",r1.data.id); if(r2.error) throw r2.error; }
    else { const r3 = await this.sb.from("votes").insert({group_id:this.code,member_id:mid,day}); if(r3.error) throw r3.error; }
  }
  subscribe(cb){ const ch=this.sb.channel("room-"+this.code); ["groups","members","busy_days","votes"].forEach(t=>ch.on("postgres_changes",{event:"*",schema:"public",table:t},cb)); ch.subscribe(); return ()=>this.sb.removeChannel(ch); }
}

/* ===== STANJE ===== */
let store=null, unsub=null, reloadTimer=null;
const state={ code:null, view:"participant", me:null, ym:{y:new Date().getFullYear(),m:new Date().getMonth()}, data:{group:{threshold:6,name:"",phase:"availability",final_days:[]},members:[],busy:[],votes:[]}, error:null, overlay:null, showBrk:false };
function getMe(code){ try{return JSON.parse(localStorage.getItem("ksd-me:"+code));}catch(e){return null;} }
function setMe(code,me){ localStorage.setItem("ksd-me:"+code,JSON.stringify(me)); }
function getDone(code){ return localStorage.getItem("ksd-done:"+code)==="1"; }
function setDone(code,v){ if(v) localStorage.setItem("ksd-done:"+code,"1"); else localStorage.removeItem("ksd-done:"+code); }
function getVoteDone(code){ return localStorage.getItem("ksd-votedone:"+code)==="1"; }
function setVoteDone(code,v){ if(v) localStorage.setItem("ksd-votedone:"+code,"1"); else localStorage.removeItem("ksd-votedone:"+code); }
function rememberRoom(code,name,results){ let l=[]; try{l=JSON.parse(localStorage.getItem("ksd-rooms"))||[];}catch(e){} l=l.filter(r=>r.code!==code); l.unshift({code,name:name||code,results:!!results}); localStorage.setItem("ksd-rooms",JSON.stringify(l.slice(0,8))); }
function getRooms(){ try{return JSON.parse(localStorage.getItem("ksd-rooms"))||[];}catch(e){return [];} }
function busySet(){ const s=new Set(); for(const b of state.data.busy) s.add(b.member_id+"|"+b.day); return s; }
function votesSet(){ const s=new Set(); for(const v of state.data.votes) s.add(v.member_id+"|"+v.day); return s; }
const APP_URL="https://poni-9.github.io/kdaj-se-dobimo/";
function isWebHosted(){ return location.protocol==="http:"||location.protocol==="https:"; }
function shareURL(){ const base=isWebHosted()?(location.origin+location.pathname):APP_URL; return base+"#/r/"+encodeURIComponent(state.code); }
function overviewURL(){ const base=isWebHosted()?(location.origin+location.pathname):APP_URL; return base+"#/r/"+encodeURIComponent(state.code)+"/pregled"; }
function voteURL(){ const base=isWebHosted()?(location.origin+location.pathname):APP_URL; return base+"#/r/"+encodeURIComponent(state.code)+"/glasuj"; }

function parseRoute(){ const h=location.hash.replace(/^#\/?/,""); const p=h.split("/").filter(Boolean); if(p[0]==="r"&&p[1]){ var v=p[2]==="rezultati"?"results":(p[2]==="pregled"?"overview":(p[2]==="glasuj"?"vote":"participant")); return {code:decodeURIComponent(p[1]), view:v}; } return {code:null}; }

    const cls=["cell"]; if(out)cls.push("out"); if(!out&&green)cls.push("enough"); if(ds===todayStr)cls.push("today"); if(!out&&past)cls.push("past");

    ${bd.map(x=>{ const dt=L.parseYMD(x.day); return `<div class="bd" data-act="rday" data-d="${x.day}" style="cursor:pointer">

      <div class="sectitle">${IC.vote} Končno glasovanje</div>
      <div class="hint" style="margin:-4px 0 12px">Ekipa glasuje za najboljši dan. Tukaj so rezultati.</div>

/* ---- POGLED: glasovanje (udeleženci glasujejo za končni dan) ---- */
function renderVote(){
  const d=state.data, finalDays=(d.group.final_days||[]).slice().sort();
  let html=header((d.group.name||state.code)+" · glasovanje");

  if(d.group.phase!=="finalvote" || !finalDays.length){

    </div>`;
    $app.innerHTML=html; return;
  }

  if(!state.me){
    const showNew = state.showNewMember;
    if(!showNew && d.members.length > 0){
      html+=`<div class="ask"><h4>Kdo glasuje?</h4>
        <div class="hint" style="margin:-4px 0 10px">Izberi svoje ime s seznama ali dodaj novega.</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          ${d.members.map(m=>`<button class="btn ghost wide" data-act="selectme" data-mid="${m.id}" data-mname="${esc(m.name)}" style="justify-content:flex-start">${esc(m.name)}</button>`).join('')}

    } else {

        <div class="hint" style="margin:-4px 0 10px">Vpiši svoje ime.</div>
        <div class="row"><input id="nameInput" placeholder="Tvoje ime" /><button class="btn" data-act="join">Naprej</button></div>
        ${d.members.length > 0 ? `<button class="hint" data-act="hidenewme" style="margin-top:10px;font-weight:600">Nisem nov, prikaži seznam imen</button>` : ''}
      </div>`;
    }
  }

  const vs = votesSet();
  const myVoteCount = state.me ? d.votes.filter(v=>v.member_id===state.me.id).length : 0;

  if(state.me && getVoteDone(state.code)){
    const voteCounts={};
    for(const v of d.votes) voteCounts[v.day]=(voteCounts[v.day]||0)+1;
    const maxV=Math.max(1,...finalDays.map(ds=>voteCounts[ds]||0));
    const sorted=finalDays.slice().sort((a,b)=>(voteCounts[b]||0)-(voteCounts[a]||0));
    const topCount=voteCounts[sorted[0]]||0;

      <div class="donecheck">✓</div>
      <h3>Glas oddan! Hvala, ${esc(state.me.name)}.</h3>
      <p class="hint" style="margin:10px auto 0;max-width:340px">Glasoval/-a si za <b>${myVoteCount}</b> ${myVoteCount===1?'dan':'dni'}.</p>
      <button class="btn ghost wide" data-act="editvote" style="margin-top:18px">Spremeni glas</button>
    </div>`;

        return `<div class="vresult${isW?' winner':''}">

    </div>`;
    $app.innerHTML=html; return;
  }

  /* Glasovalni seznam */
  const voteCounts={};

/* ---- POGLED: rezultati (organizator, zasebno) ---- */

  const {y,m}=state.ym, cells=L.monthMatrix(y,m), todayStr=L.ymd(new Date());
  let grid="";
  for(const dt of cells){
    const ds=L.ymd(dt), out=dt.getMonth()!==m, past=ds<todayStr;
    const free=L.freeCountForDay(members,bs,ds), green=L.isGreen(free,thr);
    const cls=["cell"]; if(out)cls.push("out"); if(!out&&green)cls.push("enough"); if(ds===todayStr)cls.push("today"); if(!out&&past)cls.push("past");
    grid+=`<div class="${cls.join(" ")}" ${out?"":`data-act="rday" data-d="${ds}"`}><span class="d">${dt.getDate()}</span>${out?"":`<span class="c">${free}</span>`}</div>`;
  }

  const bd=L.bestDates(members,bs,days,thr,5).filter(x=>x.free>0);
  const rank=L.bestWeekday(members,bs,days,thr), top=rank[0], maxAvg=Math.max(1,...rank.map(r=>r.avg));
  const wkRows=rank.map(r=>`<div class="wk"><div class="lbl" style="${r===top?'color:var(--green-ink);font-weight:800':''}">${L.DOW_LONG[r.weekday]}</div><div class="barbg"><div class="bar" style="width:${Math.round(r.avg/maxAvg*100)}%;${r===top?'background:var(--green)':''}"></div></div><div class="val">${r.avg.toFixed(1)}${r.meet?` · ${r.meet}✓`:""}</div></div>`).join("");

  let html=header((d.group.name||state.code)+" · rezultati");
  html+=`<div class="banner share">
    <div style="font-weight:800">1 · Povabi ekipo</div>
    <div class="hint" style="margin-top:2px">Pošlji to povezavo, da vsak označi, kdaj <b>ne more</b>.</div>

  </div>`;

  /* Banner za končno glasovanje */
  const phase = d.group.phase || "availability";
  const finalDays = (d.group.final_days || []).slice().sort();
  if(phase==="finalvote" && finalDays.length){
    const voteCounts={};
    for(const v of d.votes) voteCounts[v.day]=(voteCounts[v.day]||0)+1;

    const topCount=voteCounts[sorted[0]]||0;
    const totalVoters=new Set(d.votes.map(v=>v.member_id)).size;
    html+=`<div class="banner" style="background:#fff8e8;border:1px solid #f0e2bd">
      <div style="font-weight:800;display:flex;align-items:center;gap:8px">${IC.vote} 3 · Končno glasovanje <span style="font-size:12px;font-weight:600;color:var(--green);background:var(--green-soft);padding:3px 8px;border-radius:8px">aktivno</span></div>
      <div class="hint" style="margin-top:4px">Pošlji to povezavo ekipi, da glasujejo za najboljši dan. Glasovalo: <b style="color:var(--ink)">${totalVoters}</b></div>
      <div class="linkbox"><input id="voteLink" readonly value="${esc(voteURL())}"><button class="btn" data-act="copyvote" style="white-space:nowrap">Kopiraj</button></div>
      <div style="margin-top:14px">
        ${sorted.map(ds=>{const dt=L.parseYMD(ds),c=voteCounts[ds]||0,isW=c>0&&c===topCount;
          return `<div class="vresult${isW?' winner':''}">
            <div class="vr-num">${c}</div>
            <div class="vr-info"><div class="vr-day">${cap(L.DOW_LONG[L.weekdayMon0(dt)])}, ${dt.getDate()}. ${L.MONTHS[dt.getMonth()]}</div><div class="vr-votes">${c} ${c===1?'glas':'glasov'}</div></div>
            <div class="vr-bar"><div class="vr-fill${isW?' winner':''}" style="width:${Math.round(c/maxV*100)}%"></div></div>
          </div>`;}).join("")}
      </div>
      <button class="btn ghost wide" data-act="cancelfinal" style="margin-top:14px">Prekliči glasovanje</button>
    </div>`;
  }

  html+=`<div class="card pad">
    ${monthNav()}
    <div class="instr">Številka = koliko ljudi je takrat prostih. <span class="sq" style="background:var(--green)"></span> = vas je vsaj ${thr}. Tapni dan za kdo.</div>
    ${dowRow()}
    <div class="grid">${grid}</div>
  </div>`;
  html+= (members.length&&bd.length)?`<div class="card pad" style="margin-top:14px">
    <div class="sectitle"><span style="color:#e8a91d;display:inline-flex">${IC.star}</span>Najboljši dnevi za druženje</div>
    ${bd.map(x=>{ const dt=L.parseYMD(x.day); return `<div class="bd" data-act="rday" data-d="${x.day}" style="cursor:pointer">
      <div class="num ${x.green?'g':''}">${x.free}</div>
      <div style="flex:1"><div style="font-weight:700">${cap(L.DOW_LONG[L.weekdayMon0(dt)])}, ${dt.getDate()}. ${L.MONTHS[dt.getMonth()]}</div><div class="hint">${x.free} od ${members.length} prostih</div></div>
    </div>`; }).join("")}
  </div>`:`<div class="card pad" style="margin-top:14px"><div class="hint" style="text-align:center">Ko ekipa označi razpoložljivost, se tu pokažejo najboljši dnevi.</div></div>`;

  /* Gumb za začetek glasovanja */
  if(phase==="availability" && members.length && bd.length){
    const greenDays = L.monthDays(y,m).concat(
      /* dodamo tudi vse prihodnje mesece, ki so zeleni — za zdaj samo trenutni mesec */
    ).filter(ds=>{
      if(ds<todayStr) return false;
      const free=L.freeCountForDay(members,bs,ds);
      return L.isGreen(free,thr);
    });
    if(greenDays.length){
      html+=`<button class="btn wide green" data-act="startfinal" style="margin-top:14px">${IC.vote} Začni končno glasovanje (${greenDays.length} zelenih dni)</button>
      <div class="hint" style="text-align:center;margin-top:8px">Ekipi se pošljejo samo zeleni dnevi, da skupaj izberejo najboljši termin.</div>`;
    }
  }

  html+=`<div class="card foot">
    <button data-act="members">${IC.users}${members.length} odgovorilo</button>
    <div class="stepper">Vsaj <button data-act="thrminus">−</button><b>${thr}</b><button data-act="thrplus">+</button></div>
    <button data-act="copyov">${IC.share}Deli pregled</button>
  </div>
  <details class="brk card pad" ${state.showBrk?"open":""} style="margin-top:12px">
    <summary data-act="brk">Po dnevih v tednu ▾</summary><div style="margin-top:10px">${wkRows}</div>
  </details>`;
  $app.innerHTML=html;
}

/* ===== OVERLAYS ===== */
function openOverlay(h){ state.overlay=`<div class="overlay" data-act="ovbg">${h}</div>`; render(); }
function closeOverlay(){ state.overlay=null; render(); }
function dayInfoOverlay(ds){
  const d=state.data, bs=busySet(), free=L.whoFree(d.members,bs,ds), busy=L.whoBusy(d.members,bs,ds), dt=L.parseYMD(ds);
  const title=`${cap(L.DOW_LONG[L.weekdayMon0(dt)])}, ${dt.getDate()}. ${L.MONTHS[dt.getMonth()]}`;
  return `<div class="sheet"><div class="grab"></div><div class="pad">
    <div class="row" style="justify-content:space-between"><h3>${title}</h3><button class="close" data-act="ovclose">✕</button></div>
    <div class="lab" style="margin:18px 0 8px;color:var(--green-ink);display:flex;align-items:center;gap:8px"><span class="sq" style="background:var(--green)"></span>Prosti (${free.length})</div>
    <div class="peep">${free.length?free.map(m=>`<span class="tag free">${esc(m.name)}</span>`).join(''):'<span class="tag grey">nihče</span>'}</div>
    <div class="lab" style="margin:18px 0 8px;color:#d23a56;display:flex;align-items:center;gap:8px"><span class="sq" style="background:var(--pink)"></span>Ne morejo (${busy.length})</div>
    <div class="peep">${busy.length?busy.map(m=>`<span class="tag busy">${esc(m.name)}</span>`).join(''):'<span class="tag grey">nihče</span>'}</div>
  </div></div>`;
}
function membersOverlay(){
  const d=state.data;
  const isOrg = state.view === "results";
  const chips=d.members.length?d.members.map(m=>{
    if(isOrg) return `<span class="tag grey" style="display:inline-flex;align-items:center;gap:6px">${esc(m.name)} <button data-act="delmember" data-mid="${m.id}" style="color:var(--muted);font-size:18px;padding:0;line-height:1;margin-top:-2px" title="Izbriši">&times;</button></span>`;
    return `<span class="tag grey">${esc(m.name)}</span>`;
  }).join(''):'<span class="muted">Še nihče ni odgovoril.</span>';
  return `<div class="sheet"><div class="grab"></div><div class="pad"><div class="row" style="justify-content:space-between"><h3>Odgovorilo (${d.members.length})</h3><button class="close" data-act="ovclose">✕</button></div><div class="peep" style="margin-top:16px">${chips}</div><div class="hint" style="margin-top:12px;text-align:center">${isOrg?"Uporabnika lahko izbrišeš s klikom na križec.":""}</div></div></div>`;
}
function renameOverlay(){
  return `<div class="sheet"><div class="grab"></div><div class="pad"><div class="row" style="justify-content:space-between"><h3>Tvoje ime</h3><button class="close" data-act="ovclose">✕</button></div>
    <label class="fld" style="margin-top:16px"><span>Ime</span><input id="rn_name" value="${esc(state.me?state.me.name:"")}" /></label>
    <button class="btn wide" data-act="saverename">Shrani</button></div></div>`;
}

/* ===== DEJANJA ===== */
async function ensureMe(){ if(state.me) return true; toast("Najprej vpiši ime"); const ni=document.getElementById("nameInput"); if(ni) ni.focus(); return false; }
async function doJoin(name){ name=(name||"").trim(); if(!name){ toast("Vpiši ime"); return; } await store.ensureGroup(state.data.group.name||state.code); const ex=state.data.members.find(mm=>(mm.name||"").trim().toLowerCase()===name.toLowerCase()); const m=ex||await store.addMember(name); state.me={id:m.id,name:m.name}; setMe(state.code,state.me); await reload(); toast(ex?("Nazaj, "+m.name+"!"):("Živjo, "+m.name+"!")); }
async function setThr(n){ n=Math.max(1,n); await store.setThreshold(n); await reload(); }
async function copyShare(){ try{ await navigator.clipboard.writeText(shareURL()); toast("Povezava kopirana"); }catch(_){ const el=document.getElementById("shareLink"); if(el){el.select();} toast(shareURL()); } }
async function copyOverview(){ try{ await navigator.clipboard.writeText(overviewURL()); toast("Povezava kopirana"); }catch(_){ const el=document.getElementById("ovLink"); if(el){el.select();} toast(overviewURL()); } }
async function copyVoteLink(){ try{ await navigator.clipboard.writeText(voteURL()); toast("Povezava kopirana"); }catch(_){ const el=document.getElementById("voteLink"); if(el){el.select();} toast(voteURL()); } }

$app.addEventListener("click", async (e)=>{
  const t=e.target.closest("[data-act]"); if(!t) return; const act=t.dataset.act;
  if(act==="ovbg"){ if(e.target===t) closeOverlay(); return; }
  if(act==="ovclose"){ closeOverlay(); return; }
  if(act==="prev"){ let {y,m}=state.ym; m--; if(m<0){m=11;y--;} state.ym={y,m}; render(); return; }
  if(act==="next"){ let {y,m}=state.ym; m++; if(m>11){m=0;y++;} state.ym={y,m}; render(); return; }
  if(act==="join"){ await doJoin(document.getElementById("nameInput").value); return; }
  if(act==="rename"){ openOverlay(renameOverlay()); return; }
  if(act==="saverename"){ const nn=document.getElementById("rn_name").value.trim(); if(!nn) return; await store.renameMember(state.me.id,nn); state.me.name=nn; setMe(state.code,state.me); closeOverlay(); await reload(); toast("Shranjeno"); return; }
  if(act==="pday"){
    if(!(await ensureMe())) return;
    try { await store.toggleBusy(state.me.id,t.dataset.d); } catch(err) { toast("Napaka pri označevanju: " + (err.message||err)); }
    await reload(); return;
  }
  if(act==="finish"){ if(!(await ensureMe())) return; setDone(state.code,true); try{window.scrollTo(0,0)}catch(e){} render(); return; }
  if(act==="edit"){ setDone(state.code,false); render(); return; }
  if(act==="rday"){ openOverlay(dayInfoOverlay(t.dataset.d)); return; }
  if(act==="members"){ openOverlay(membersOverlay()); return; }
  if(act==="delmember"){ if(confirm("Želiš izbrisati tega uporabnika in vse njegove vnose?")) { await store.deleteMember(t.dataset.mid); if(state.me && state.me.id === t.dataset.mid){ localStorage.removeItem("ksd-me:"+state.code); state.me=null; } await reload(); openOverlay(membersOverlay()); } return; }
  if(act==="thrplus"){ await setThr((state.data.group.threshold||0)+1); return; }
  if(act==="thrminus"){ await setThr((state.data.group.threshold||0)-1); return; }
  if(act==="selectme"){ state.me={id:t.dataset.mid,name:t.dataset.mname}; setMe(state.code,state.me); render(); return; }
  if(act==="shownewme"){ state.showNewMember=true; render(); return; }
  if(act==="hidenewme"){ state.showNewMember=false; render(); return; }
  if(act==="brk"){ state.showBrk=!state.showBrk; return; }
  if(act==="copyshare"){ await copyShare(); return; }
  if(act==="copyov"){ await copyOverview(); return; }
  if(act==="copyvote"){ await copyVoteLink(); return; }
  /* Glasovanje */
  if(act==="startfinal"){
    const d=state.data, thr=d.group.threshold||0, members=d.members, bs=busySet(), todayStr=L.ymd(new Date());
    /* Zberi vse zelene dneve iz vseh mesecev od danes naprej (uporabimo 6 mesecev) */
    const greenDays=[];
    const startY=new Date().getFullYear(), startM=new Date().getMonth();
    for(let off=0;off<6;off++){
      let mi=(startM+off)%12, yi=startY+Math.floor((startM+off)/12);
      const mdays=L.monthDays(yi,mi);
      for(const ds of mdays){
        if(ds<todayStr) continue;
        const free=L.freeCountForDay(members,bs,ds);
        if(L.isGreen(free,thr)) greenDays.push(ds);
      }
    }
    if(!greenDays.length){ toast("Ni zelenih dni za glasovanje"); return; }
    try{ await store.startFinalVote(greenDays); }catch(err){ toast("Napaka: "+(err.message||err)); return; }
    setVoteDone(state.code,false);
    await reload();
    toast("Glasovanje začeto!");
    return;
  }
  if(act==="cancelfinal"){
    if(!confirm("Prekliči glasovanje? Vsi oddani glasovi bodo izbrisani.")) return;
    try{ await store.cancelFinalVote(); }catch(err){ toast("Napaka: "+(err.message||err)); return; }
    setVoteDone(state.code,false);
    await reload();
    toast("Glasovanje preklicano");
    return;
  }
  if(act==="vday"){
    if(!(await ensureMe())) return;
    try{ await store.toggleVote(state.me.id,t.dataset.d); }catch(err){ toast("Napaka: "+(err.message||err)); }
    await reload();
    return;
  }
  if(act==="submitvote"){
    if(!(await ensureMe())) return;
    const myVotes=state.data.votes.filter(v=>v.member_id===state.me.id).length;
    if(!myVotes){ toast("Izberi vsaj en dan"); return; }
    setVoteDone(state.code,true);
    try{window.scrollTo(0,0)}catch(e){}
    render();
    return;
  }
  if(act==="editvote"){
    setVoteDone(state.code,false);
    render();
    return;
  }
});
$app.addEventListener("keydown",e=>{ if(e.key==="Enter"&&e.target.id==="nameInput") doJoin(e.target.value); });

/* ===== LANDING ===== */
function renderLanding(){
  const rooms=getRooms();
  const roomsHtml=rooms.length?`<div class="card pad" style="margin-top:16px"><h4 style="margin-bottom:12px">Nazadnje</h4><div style="display:flex;flex-direction:column;gap:10px">${rooms.map(r=>`<button class="btn ghost wide" data-land="open" data-code="${esc(r.code)}" data-results="${r.results?1:0}" style="justify-content:space-between">${esc(r.name)}<span class="muted" style="font-weight:600">${r.results?'rezultati':'anketa'} · ${esc(r.code)}</span></button>`).join("")}</div></div>`:"";
  $app.innerHTML=`${header("anketa razpoložljivosti")}
    <div class="hero"><h2>Kdaj ima ekipa čas?</h2><p>Najlažji način, da skupina najde skupni termin.</p></div>
    <div class="card pad" style="margin-top:10px">
      <h4 style="margin-bottom:16px">Kako deluje</h4>
      <div class="steps">
        <div class="step"><div class="n">1</div><div class="tx"><b>Ustvariš anketo</b><div class="sub">Vpišeš ime skupine in dobiš svojo povezavo.</div></div></div>
        <div class="step"><div class="n">2</div><div class="tx"><b>Pošlješ povezavo ekipi</b><div class="sub">Vsak vpiše ime in na koledarju označi, kdaj <b>NE more</b>.</div></div></div>
        <div class="step"><div class="n">3</div><div class="tx"><b>Dobiš najboljši dan</b><div class="sub">Koledar sam pokaže, kdaj je največ ljudi prostih. Te rezultate vidiš samo ti.</div></div></div>
      </div>
    </div>
    <div class="card pad" style="margin-top:14px"><h4>Začni tukaj</h4>
      <label class="fld" style="margin-top:12px"><span>Ime skupine</span><input id="l_name" placeholder="npr. Nogometna raja" /></label>
      <button class="btn wide" data-land="create">Ustvari anketo in dobi povezavo →</button></div>
    <div class="card pad" style="margin-top:14px"><h4>Imaš že kodo?</h4>
      <div class="hint" style="margin-top:2px">Če ti je nekdo poslal povezavo, jo samo odpri. Kodo vpiši le, če nimaš povezave.</div>
      <div class="row" style="margin-top:12px"><input id="l_code" placeholder="npr. klapa-482" /><button class="btn ghost" data-land="join" style="white-space:nowrap">Vstopi</button></div></div>
    ${roomsHtml}
    ${!ONLINE?`<p class="hint" style="text-align:center;margin-top:18px">Lokalni način: podatki ostanejo na tej napravi.</p>`:""}`;
  $app.onclick=async (e)=>{
    const b=e.target.closest("[data-land]"); if(!b) return;
    if(b.dataset.land==="create"){ const name=(document.getElementById("l_name").value||"").trim(); const code=L.genCode(Math.random); rememberRoom(code,name||code,true); const s=ONLINE?new CloudStore(code):new LocalStore(code); try{await s.ensureGroup(name||code);}catch(_){} goto(code,"results"); }
    if(b.dataset.land==="join"){ const code=(document.getElementById("l_code").value||"").trim().toLowerCase(); if(!code){toast("Vpiši kodo");return;} goto(code,"participant"); }
    if(b.dataset.land==="open"){ goto(b.dataset.code, b.dataset.results==="1"?"results":"participant"); }
  };
}

/* ===== ZAGON ===== */
async function loadSupabase(){ if(!ONLINE) return; await new Promise((res,rej)=>{ const s=document.createElement("script"); s.src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"; s.onload=res; s.onerror=()=>rej(new Error("Ni bilo mogoče naložiti Supabase")); document.head.appendChild(s); }); window.__sb=window.supabase.createClient(CONFIG.SUPABASE_URL,CONFIG.SUPABASE_ANON_KEY); }
async function boot(){
  const r=parseRoute();
  if(unsub){ unsub(); unsub=null; }
  if(!r.code){ renderLanding(); return; }
  $app.onclick=null;
  state.code=r.code; state.view=r.view; state.me=getMe(r.code); state.overlay=null; state.error=null;
  try{ if(ONLINE&&!window.__sb) await loadSupabase(); }catch(e){ state.error=e.message; }
  store=ONLINE?new CloudStore(r.code):new LocalStore(r.code);
  render(); await reload();
  rememberRoom(r.code, state.data.group.name||r.code, r.view==="results");
  unsub=store.subscribe(scheduleReload);
}
window.addEventListener("hashchange",boot);
boot();
</script>
